services:
  web:
    image: neiland/claritystructures:v2
    container_name: claritystructures-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    env_file:
      - .env.production.local
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app:
    driver: bridge
